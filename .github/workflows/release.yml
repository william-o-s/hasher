name: Release

on:
  push:
    tags:
      - 'v*' # Trigger only on version tags (e.g., v1.0.0)

permissions:
    contents: write

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: hasher-linux
            asset: hasher-linux.tar.gz
          - os: windows-latest
            artifact: hasher-windows.exe
            asset: hasher-windows.zip
          - os: macos-latest
            artifact: hasher-macos
            asset: hasher-macos.tar.gz
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies (Linux only)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwayland-dev libxkbcommon-dev libdbus-1-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build for release
        run: cargo build --release --locked

      - name: Package Binaries
        shell: bash
        run: |
          mkdir dist
          # Determine the source filename by OS
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            BINARY_SOURCE="target/release/hasher.exe"
          else
            BINARY_SOURCE="target/release/hasher"
          fi

          # Copy and rename to matrix artifact name
          cp "$BINARY_SOURCE" dist/${{ matrix.artifact }}

          # Zip/Tar the renamed file
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            7z a ${{ matrix.asset }} ./dist/${{ matrix.artifact }}
          else
            tar -czvf ${{ matrix.asset }} -C dist ${{ matrix.artifact }}
          fi

      - name: Upload to workflow
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}
  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: ./assets
          merge-multiple: true # Flattens files into one folder

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./assets/*
          generate_release_notes: true
          body: |
            ## Installation Notes

            ### 🍎 macOS
            If you get a warning that the app "is damaged" or from an "unidentified developer":
            1. Right-click the app and select **Open**.
            2. Or, run this command in your terminal:
               `xattr -d com.apple.quarantine ./hasher-macos`

            ### 🐧 Linux
            Ensure you have `libgtk-3` and `libssl` installed. You may need to make the file executable:
            `chmod +x ./hasher-linux`

            ### 🪟 Windows
            Windows SmartScreen may flag the app as unrecognized. Click **More info** -> **Run anyway**.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}